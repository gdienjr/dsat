<!DOCTYPE html>
<html lang="ms">
<head>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d6efd">
<link rel="apple-touch-icon" href="icon-192.png">
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/dsat/sw.js')
    .then(function() { console.log('SW berdaftar'); })
    .catch(function(err) { console.log('SW gagal:', err); });
}
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempahan Dewan DSAT</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body { background-color: #f0f2f5; }
    .kad { max-width: 500px; margin: 30px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    #loading { display: none; text-align: center; padding: 15px; }
    .btn-slot { min-width: 90px; font-size: 0.85rem; }
    #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; }
</style>
</head>
<body class="p-3">

<div class="kad">
    <h4 class="text-center fw-bold mb-1">🏛️ Tempahan Dewan</h4>
    <p class="text-center text-muted mb-4">Dewan Sivik Atas Tol (DSAT)</p>

    <div class="mb-3">
        <label class="form-label fw-semibold">Nama Penyewa:</label>
        <input type="text" id="nama" class="form-control" placeholder="Nama">
    </div>
    <div class="mb-3">
        <label class="form-label fw-semibold">Nombor Telefon:</label>
        <input type="tel" id="telefon" class="form-control" placeholder="cth: 0123456789">
    </div>
    <div class="mb-3">
        <label class="form-label fw-semibold">Pilih Tarikh:</label>
        <input type="date" id="tarikh" class="form-control">
    </div>

    <div id="loading">
        <div class="spinner-border text-primary"></div>
        <p class="mt-2 text-muted">Sedang menyemak slot...</p>
    </div>

    <div id="bahagianSlot" style="display:none;">
        <label class="form-label fw-semibold">Pilih Slot Masa:</label>
        <div class="mb-2 small text-muted">
            <span class="badge bg-success">Tersedia</span>
            <span class="badge bg-warning text-dark ms-1">Dipilih</span>
            <span class="badge bg-secondary ms-1">Ditempah</span>
            <span class="badge bg-danger ms-1">Penyewa Tetap</span>
            <span class="badge bg-dark ms-1">Tidak Tersedia</span>
        </div>
        <div id="slotContainer" class="d-flex flex-wrap gap-2"></div>

        <div id="ringkasanPilihan" class="mt-3 p-3 bg-light rounded small" style="display:none;">
            <strong>⏰ Slot Dipilih:</strong><br>
            <span id="senaraiPilihan"></span><br><br>
            <strong>💰 Jumlah Bayaran: <span id="jumlahHarga" class="text-success"></span></strong>
        </div>

        <button type="button" id="btnHantar" class="btn btn-primary w-100 mt-3" onclick="hantarTempahan()">
            📨 Hantar Tempahan
        </button>
    </div>
</div>

<!-- Modal -->
<div id="modalOverlay">
    <div style="display:flex; justify-content:center; align-items:center; height:100%;">
        <div style="background:white; border-radius:12px; padding:25px; max-width:420px; width:90%; text-align:center;">
            <h5 class="fw-bold mb-3">✅ Tempahan Dihantar!</h5>
            <div id="modalRingkasan" class="text-start bg-light p-3 rounded mb-3 small"></div>
            <p class="text-muted small mb-3">Sila hantar WhatsApp kepada admin untuk pengesahan tempahan.</p>
            <button class="btn btn-success w-100 mb-2" onclick="hantarWhatsApp()">
                💬 Hantar WhatsApp ke Admin
            </button>
            <button class="btn btn-outline-secondary w-100" onclick="tutupModal()">
                Tutup
            </button>
        </div>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxgf08_SZw5JApLuYBbI7WkymeIs8jbfnB0KEbd50G7RlF0d20Ol2WuEuB_y_3au1Hd/exec";
const ADMIN_WA = "60199812960";
const HARGA_SLOT = 10;

let pilihanSlot = [];
let dataHantar = {};
let sedangHantar = false; // flag elak double submit

function format12Jam(masa24) {
    const jam = parseInt(masa24.split(":")[0]);
    if (jam === 0) return "12:00 AM";
    if (jam < 12) return jam + ":00 AM";
    if (jam === 12) return "12:00 PM";
    return (jam - 12) + ":00 PM";
}

document.getElementById("tarikh").addEventListener("change", semakSlot);

async function semakSlot() {
    const tarikh = document.getElementById("tarikh").value;
    if (!tarikh) return;

    pilihanSlot = [];
    kemaskiniRingkasan();
    document.getElementById("loading").style.display = "block";
    document.getElementById("bahagianSlot").style.display = "none";
    document.getElementById("slotContainer").innerHTML = "";

    try {
        const response = await fetch(SCRIPT_URL + "?tarikh=" + tarikh);
        const data = await response.json();
        document.getElementById("loading").style.display = "none";
        document.getElementById("bahagianSlot").style.display = "block";
        renderButtons(data);
    } catch (err) {
        console.error("Fetch Error:", err);
        document.getElementById("loading").style.display = "none";
        alert("Gagal ambil data. Sila cuba semula.");
    }
}

function renderButtons(data) {
    let container = document.getElementById("slotContainer");
    container.innerHTML = "";
    pilihanSlot = [];

    let ditempahTetap = data.tetap || [];
    let ditempahAwam  = data.awam  || [];
    let ditempahBlok  = data.blok  || [];

    for (let h = 8; h <= 23; h++) {
        let jam = h.toString().padStart(2, '0') + ":00";
        let label = format12Jam(jam);
        let btn = document.createElement("button");
        btn.type = "button";
        btn.className = "btn btn-slot";

        if (ditempahBlok.includes(jam)) {
            btn.className += " btn-dark";
            btn.innerText = label + " 🚫";
            btn.disabled = true;
            btn.title = "Tidak tersedia";
        } else if (ditempahTetap.includes(jam)) {
            btn.className += " btn-danger";
            btn.innerText = label + " 🔒";
            btn.disabled = true;
            btn.title = "Penyewa Tetap";
        } else if (ditempahAwam.includes(jam)) {
            btn.className += " btn-secondary";
            btn.innerText = label + " ✗";
            btn.disabled = true;
            btn.title = "Sudah Ditempah";
        } else {
            btn.className += " btn-success";
            btn.innerText = label;
            btn.onclick = function() { toggleSelect(this, jam); };
        }
        container.appendChild(btn);
    }
}

function toggleSelect(btn, masa) {
    if (pilihanSlot.includes(masa)) {
        pilihanSlot = pilihanSlot.filter(s => s !== masa);
        btn.classList.replace('btn-warning', 'btn-success');
        btn.innerText = format12Jam(masa);
    } else {
        pilihanSlot.push(masa);
        btn.classList.replace('btn-success', 'btn-warning');
        btn.innerText = format12Jam(masa) + " ✓";
    }
    pilihanSlot.sort();
    kemaskiniRingkasan();
}

function kemaskiniRingkasan() {
    const ringkasan = document.getElementById("ringkasanPilihan");
    if (pilihanSlot.length === 0) {
        ringkasan.style.display = "none";
        return;
    }
    ringkasan.style.display = "block";
    document.getElementById("senaraiPilihan").innerText = pilihanSlot.map(format12Jam).join(", ");
    document.getElementById("jumlahHarga").innerText = "RM" + (pilihanSlot.length * HARGA_SLOT).toFixed(2);
}

async function hantarTempahan() {
    // Elak double submit
    if (sedangHantar) return;

    const nama = document.getElementById("nama").value.trim();
    const telefon = document.getElementById("telefon").value.trim();
    const tarikh = document.getElementById("tarikh").value;

    if (!nama) { alert("Sila masukkan nama."); return; }
    if (!telefon) { alert("Sila masukkan nombor telefon."); return; }
    if (!telefon.startsWith("0")) {
        alert("Nombor telefon mesti bermula dengan 0.\nContoh: 0123456789");
        return;
    }
    if (!tarikh) { alert("Sila pilih tarikh."); return; }
    if (pilihanSlot.length === 0) { alert("Sila pilih sekurang-kurangnya satu slot masa."); return; }

    // Set flag dan disable button
    sedangHantar = true;
    const btnHantar = document.getElementById("btnHantar");
    btnHantar.disabled = true;
    btnHantar.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Menghantar...';

    const jumlah = pilihanSlot.length * HARGA_SLOT;
    dataHantar = { nama, telefon, tarikh, slot: [...pilihanSlot], jumlah };

    try {
        await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ nama, telefon, tarikh, masa: pilihanSlot })
        });
        paparModal();
    } catch (err) {
        console.error("POST Error:", err);
        alert("Gagal hantar tempahan. Sila cuba semula.");
    } finally {
        // Reset flag dan enable balik button
        sedangHantar = false;
        btnHantar.disabled = false;
        btnHantar.innerHTML = '📨 Hantar Tempahan';
    }
}

function paparModal() {
    const { nama, telefon, tarikh, slot, jumlah } = dataHantar;
    const tarikhPapar = new Date(tarikh + "T00:00:00").toLocaleDateString("ms-MY", {
        weekday: "long", year: "numeric", month: "long", day: "numeric"
    });

    document.getElementById("modalRingkasan").innerHTML =
        '<table class="table table-sm table-borderless mb-0">' +
            '<tr><td>📛 Nama</td><td><strong>' + nama + '</strong></td></tr>' +
            '<tr><td>📞 Telefon</td><td><strong>' + telefon + '</strong></td></tr>' +
            '<tr><td>📅 Tarikh</td><td><strong>' + tarikhPapar + '</strong></td></tr>' +
            '<tr><td>⏰ Slot</td><td><strong>' + slot.map(format12Jam).join(", ") + '</strong></td></tr>' +
            '<tr><td>💰 Jumlah</td><td><strong class="text-success">RM' + jumlah.toFixed(2) + '</strong></td></tr>' +
        '</table>';

    document.getElementById("modalOverlay").style.display = "block";
}

function hantarWhatsApp() {
    const { nama, telefon, tarikh, slot, jumlah } = dataHantar;
    const tarikhPapar = new Date(tarikh + "T00:00:00").toLocaleDateString("ms-MY", {
        weekday: "long", year: "numeric", month: "long", day: "numeric"
    });

    const mesej =
        "Assalamualaikum, saya ingin menempah Dewan Sivik Atas Tol (DSAT).\n\n" +
        "\ud83d\udccb *Butiran Tempahan:*\n" +
        "\ud83d\udc64 Nama: " + nama + "\n" +
        "\ud83d\udcde Telefon: " + telefon + "\n" +
        "\ud83d\udcc5 Tarikh: " + tarikhPapar + "\n" +
        "\u23f0 Slot: " + slot.map(format12Jam).join(", ") + "\n" +
        "\ud83d\udcb0 Jumlah: RM" + jumlah.toFixed(2) + "\n\n" +
        "Sila sahkan tempahan. Terima kasih. \ud83d\ude4f";

    window.open("https://wa.me/" + ADMIN_WA + "?text=" + encodeURIComponent(mesej), "_blank");
}

function tutupModal() {
    document.getElementById("modalOverlay").style.display = "none";
    pilihanSlot = [];
    sedangHantar = false;
    document.getElementById("nama").value = "";
    document.getElementById("telefon").value = "";
    document.getElementById("tarikh").value = "";
    document.getElementById("bahagianSlot").style.display = "none";
    document.getElementById("ringkasanPilihan").style.display = "none";
}
</script>
</body>
</html>
