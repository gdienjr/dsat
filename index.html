<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tempahan Dewan DSAT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 500px; margin-top: 30px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        #loading { display: none; text-align: center; padding: 15px; }
    </style>
</head>
<body class="p-3">
<div class="container">
    <h3 class="text-center mb-4">Tempahan Dewan DSAT</h3>
    <form id="bookingForm">
        <div class="mb-3">
            <label>Nama Penyewa:</label>
            <input type="text" id="nama" class="form-control" placeholder="Nama Penuh" required>
        </div>
        <div class="mb-3">
            <label>Pilih Tarikh:</label>
            <input type="date" id="tarikh" class="form-control" onchange="semakSlot()" required>
        </div>
        <div id="loading"><div class="spinner-border text-primary"></div><p>Sedang menyemak...</p></div>
        <div class="mb-3">
            <label>Slot Tersedia:</label>
            <div id="slotContainer" class="row g-2"></div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Hantar Tempahan</button>
    </form>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwbm8diQ8myu7YYU8DTdzHwSH8a9em3iX00nHn327l-NaNX_mzgzKd0vlVZLEv-9lY5/exec";
    let pilihanSlot = [];

    async function semakSlot() {
        const tarikh = document.getElementById("tarikh").value;
        if (!tarikh) return;
        
        document.getElementById("loading").style.display = "block";

        try {
            const response = await fetch(SCRIPT_URL + "?tarikh=" + tarikh);
            const data = await response.json(); 
            document.getElementById("loading").style.display = "none";
            renderButtons(data);
        } catch (err) {
            console.error("Fetch Error:", err);
            document.getElementById("loading").style.display = "none";
            alert("Gagal ambil data. Sila pastikan skrip sudah di-deploy.");
        }
    }

    function renderButtons(data) {
        let container = document.getElementById("slotContainer");
        container.innerHTML = ""; 
        let ditempah = data.awam || [];
        
        for(let h = 8; h <= 23; h++) {
            let jam = h.toString().padStart(2, '0') + ":00";
            let btn = document.createElement("button");
            
            // Logik butang
            let isDitempah = ditempah.includes(jam);
            btn.className = "btn m-1 " + (isDitempah ? "btn-secondary" : "btn-success");
            btn.innerText = jam + (isDitempah ? " (Ditempah)" : "");
            btn.disabled = isDitempah;
            
            if(!isDitempah) {
                btn.onclick = function() { toggleSelect(this, jam); };
            }
            container.appendChild(btn);
        }
    }

    function toggleSelect(btn, masa) {
        if (pilihanSlot.includes(masa)) {
            pilihanSlot = pilihanSlot.filter(s => s !== masa);
            btn.classList.replace('btn-primary', 'btn-success');
        } else {
            pilihanSlot.push(masa);
            btn.classList.replace('btn-success', 'btn-primary');
        }
    }
</script>
</body>
</html>
